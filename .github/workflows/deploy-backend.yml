name: Deploy backend

on:
  push:
    branches:
      - main
    paths:
      - 'backend/server.js'
      - 'backend/package.json'
      - 'backend/package-lock.json'
      - '.github/workflows/deploy-backend.yml'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check backend syntax
        run: node --check backend/server.js

      - name: Upload backend files
        uses: appleboy/scp-action@v0.1.7
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          source: 'backend/server.js,backend/package.json,backend/package-lock.json'
          target: '/opt/pokerclub'

      - name: Restart backend
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: ${{ secrets.SERVER_USER }}
          password: ${{ secrets.SERVER_PASSWORD }}
          script: |
            set -e
            cd /opt/pokerclub/backend
            node --check server.js
            npm install --omit=dev
            oldpid="$(pgrep -f '/opt/pokerclub/backend/server.js' | head -1 || true)"
            if [ -n "$oldpid" ]; then
              kill "$oldpid" || true
              sleep 1
            fi
            nohup node /opt/pokerclub/backend/server.js > /opt/pokerclub/backend/server.out.log 2> /opt/pokerclub/backend/server.err.log &
            echo $! > /opt/pokerclub/backend/server.pid
            sleep 2
            curl -fsS http://127.0.0.1:3001/api/health
